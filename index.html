<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar Kotoba</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js untuk interaksi Dropdown, Navigasi, & Data State -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- FontAwesome untuk Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800" x-data="kotobaApp()">

  <div class="flex h-screen overflow-hidden">
    
    <!-- Overlay untuk Mobile saat Sidebar Terbuka -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-black/50 z-40 md:hidden" x-transition.opacity></div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:inset-auto flex flex-col shadow-xl">
      
      <!-- Sidebar Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-800">
        <h1 class="text-xl font-bold text-white flex items-center gap-2 cursor-pointer" @click="switchTab('dashboard')">
          <i class="fa-solid fa-language text-rose-500"></i> KotobaApp
        </h1>
        <button @click="sidebarOpen = false" class="md:hidden text-slate-400 hover:text-white">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <!-- Navigation Links -->
      <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-3 mb-2">Menu Utama</div>
        
        <!-- Menu 0: Dashboard -->
        <button @click="switchTab('dashboard')" 
                :class="activeTab === 'dashboard' ? 'bg-rose-600 text-white font-medium' : 'hover:bg-slate-800 hover:text-white'" 
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition font-medium">
          <i class="fa-solid fa-house w-5"></i>
          <span>Dashboard</span>
        </button>

        <!-- Menu Standar: Hiragana -->
        <button @click="switchTab('hiragana_page')" 
                :class="activeTab === 'hiragana_page' ? 'bg-rose-600 text-white font-medium' : 'hover:bg-slate-800 hover:text-white'" 
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition font-medium">
          <i class="fa-solid fa-font w-5 text-rose-400"></i>
          <span>Hiragana (ひらがな)</span>
        </button>

        <!-- Menu Standar: Katakana -->
        <button @click="switchTab('katakana_page')" 
                :class="activeTab === 'katakana_page' ? 'bg-rose-600 text-white font-medium' : 'hover:bg-slate-800 hover:text-white'" 
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition font-medium">
          <i class="fa-solid fa-italic w-5 text-rose-400"></i>
          <span>Katakana (カタカナ)</span>
        </button>

        <!-- Menu Standar: Kanji -->
        <button @click="switchTab('kanji_page')" 
                :class="activeTab === 'kanji_page' ? 'bg-rose-600 text-white font-medium' : 'hover:bg-slate-800 hover:text-white'" 
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition font-medium">
          <i class="fa-solid fa-pen-nib w-5 text-rose-400"></i>
          <span>Kanji (漢字)</span>
        </button>

        <!-- Menu Standar: Kata Bilangan -->
        <button @click="switchTab('kata_bilangan')" 
                :class="activeTab === 'kata_bilangan' ? 'bg-rose-600 text-white font-medium' : 'hover:bg-slate-800 hover:text-white'" 
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition font-medium">
          <i class="fa-solid fa-hashtag w-5 text-rose-400"></i>
          <span>Kata Bilangan (Suuji)</span>
        </button>

        <!-- Menu 1: Kotoba (Dengan Dropdown) -->
        <div>
          <button @click="kotobaDropdown = !kotobaDropdown" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition font-medium">
            <div class="flex items-center gap-3">
              <i class="fa-solid fa-book-open text-rose-500 w-5"></i>
              <span>Kotoba</span>
            </div>
            <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" :class="kotobaDropdown ? 'rotate-180' : ''"></i>
          </button>

          <!-- Dropdown List Kotoba -->
          <div x-show="kotobaDropdown" x-transition class="pl-6 pr-2 mt-1 space-y-1">
            
            <button @click="switchTab('ungkapan_waktu')" 
                    :class="activeTab === 'ungkapan_waktu' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Ungkapan Waktu
            </button>

            <button @click="switchTab('penanda_waktu')" 
                    :class="activeTab === 'penanda_waktu' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Penanda Waktu
            </button>

            <button @click="switchTab('kata_keterangan')" 
                    :class="activeTab === 'kata_keterangan' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Kata Keterangan
            </button>

            <button @click="switchTab('kata_benda')" 
                    :class="activeTab === 'kata_benda' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Kata Benda
            </button>

            <!-- SUB-DROPDOWN: KATA KERJA -->
            <div>
              <button @click="kataKerjaDropdown = !kataKerjaDropdown" 
                      class="w-full flex items-center justify-between text-sm py-2 px-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/50 transition">
                <span>• Kata Kerja</span>
                <i class="fa-solid fa-chevron-down text-[10px] transition-transform duration-200" :class="kataKerjaDropdown ? 'rotate-180' : ''"></i>
              </button>

              <div x-show="kataKerjaDropdown" x-transition class="pl-4 pr-1 mt-1 space-y-1 border-l border-slate-800 ml-3">
                <button @click="switchTab('kk_gol1')" 
                        :class="activeTab === 'kk_gol1' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                        class="w-full text-left text-xs py-1.5 px-2 rounded-md hover:bg-slate-800/50 block transition">
                  - Golongan I
                </button>
                <button @click="switchTab('kk_gol2')" 
                        :class="activeTab === 'kk_gol2' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                        class="w-full text-left text-xs py-1.5 px-2 rounded-md hover:bg-slate-800/50 block transition">
                  - Golongan II
                </button>
                <button @click="switchTab('kk_gol3')" 
                        :class="activeTab === 'kk_gol3' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                        class="w-full text-left text-xs py-1.5 px-2 rounded-md hover:bg-slate-800/50 block transition">
                  - Golongan III
                </button>
              </div>
            </div>

            <button @click="switchTab('salam')" 
                    :class="activeTab === 'salam' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Salam (Aisatsu)
            </button>

            <button @click="switchTab('kazoku')" 
                    :class="activeTab === 'kazoku' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Kazoku (Keluarga)
            </button>

          </div>
        </div>

        <!-- Menu 2: Latihan Kotoba -->
        <button @click="switchTab('latihan')" 
                :class="activeTab === 'latihan' ? 'bg-rose-600 text-white font-medium' : 'hover:bg-slate-800 hover:text-white'" 
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition font-medium">
          <i class="fa-solid fa-pen-to-square w-5"></i>
          <span>Latihan Kotoba</span>
        </button>

      </nav>

      <!-- Sidebar Footer -->
      <div class="p-4 border-t border-slate-800 text-xs text-center text-slate-500">
        Mobile Friendly 📱
      </div>
    </aside>

    <!-- Content Area -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
      
      <!-- Top Header -->
      <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-4">
          <button @click="sidebarOpen = true" class="md:hidden text-slate-600 hover:text-slate-900 focus:outline-none">
            <i class="fa-solid fa-bars text-xl"></i>
          </button>
          
          <span class="text-lg font-semibold text-slate-800" x-text="getCategoryTitle(activeTab)"></span>
        </div>
      </header>

      <!-- Main Body Content -->
      <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <div class="max-w-4xl mx-auto space-y-6">
          
          <!-- HALAMAN DASHBOARD MAIN -->
          <template x-if="activeTab === 'dashboard'">
            <div class="space-y-6">
              
              <!-- Banner Welcome -->
              <div class="bg-gradient-to-r from-slate-900 via-rose-950 to-rose-900 rounded-3xl p-6 md:p-8 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10 space-y-3">
                  <span class="bg-rose-500/30 text-rose-200 text-xs font-semibold px-3 py-1 rounded-full border border-rose-400/30">
                    ようこそ ! Selamat Datang
                  </span>
                  <h2 class="text-2xl md:text-3xl font-extrabold tracking-tight">Kuasai Kotoba Bahasa Jepang Dengan Mudah</h2>
                  <p class="text-slate-300 text-sm md:text-base max-w-xl">
                    Aplikasi pembelajaran interaktif untuk menghafal kosakata, hiragana, katakana, kanji dasar, kata kerja, dan menguji kemampuan kamu melalui mode kuis.
                  </p>
                  <div class="pt-2 flex flex-wrap gap-3">
                    <button @click="switchTab('latihan')" class="px-5 py-2.5 bg-rose-600 hover:bg-rose-700 font-bold rounded-xl text-sm transition shadow-lg flex items-center gap-2">
                      <i class="fa-solid fa-play"></i> Mulai Ujian / Latihan
                    </button>
                    <button @click="switchTab('kanji_page')" class="px-5 py-2.5 bg-slate-800/80 hover:bg-slate-800 font-bold rounded-xl text-sm transition border border-slate-700 flex items-center gap-2">
                      <i class="fa-solid fa-pen-nib"></i> Pelajari Kanji
                    </button>
                  </div>
                </div>
              </div>

              <!-- Statistik Ringkasan -->
              <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                  <div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-xl flex items-center justify-center text-xl font-bold">
                    <i class="fa-solid fa-font"></i>
                  </div>
                  <div>
                    <div class="text-2xl font-black text-slate-800" x-text="getTotalKotobaCount()"></div>
                    <div class="text-xs font-medium text-slate-500">Total Item Materi</div>
                  </div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                  <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center text-xl font-bold">
                    <i class="fa-solid fa-pen-nib"></i>
                  </div>
                  <div>
                    <div class="text-2xl font-black text-slate-800" x-text="materiData.kanji_list.length"></div>
                    <div class="text-xs font-medium text-slate-500">Karakter Kanji</div>
                  </div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 col-span-2 md:col-span-1">
                  <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-xl font-bold">
                    <i class="fa-solid fa-layer-group"></i>
                  </div>
                  <div>
                    <div class="text-2xl font-black text-slate-800">13 Modul</div>
                    <div class="text-xs font-medium text-slate-500">Materi Lengkap</div>
                  </div>
                </div>
              </div>

              <!-- Menu Akses Cepat Kategori -->
              <div class="space-y-4">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                  <i class="fa-solid fa-compass text-rose-500"></i> Pilih Kategori Belajar
                </h3>

                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                  
                  <div @click="switchTab('kanji_page')" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-rose-300 transition cursor-pointer group">
                    <div class="flex items-center justify-between mb-3">
                      <span class="w-10 h-10 bg-rose-50 text-rose-600 rounded-lg flex items-center justify-center font-bold text-lg">漢</span>
                      <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-rose-500 transition-transform group-hover:translate-x-1"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 mb-1">Kanji Dasar</h4>
                    <p class="text-xs text-slate-500" x-text="materiData.kanji_list.length + ' Kartu Kanji N5'"></p>
                  </div>

                  <div @click="switchTab('hiragana_page')" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-rose-300 transition cursor-pointer group">
                    <div class="flex items-center justify-between mb-3">
                      <span class="w-10 h-10 bg-rose-50 text-rose-600 rounded-lg flex items-center justify-center font-bold text-lg">あ</span>
                      <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-rose-500 transition-transform group-hover:translate-x-1"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 mb-1">Huruf Hiragana</h4>
                    <p class="text-xs text-slate-500">Dasar, Dakuon, Handakuon & Yoon</p>
                  </div>

                  <div @click="switchTab('katakana_page')" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-rose-300 transition cursor-pointer group">
                    <div class="flex items-center justify-between mb-3">
                      <span class="w-10 h-10 bg-sky-50 text-sky-600 rounded-lg flex items-center justify-center font-bold text-lg">ア</span>
                      <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-rose-500 transition-transform group-hover:translate-x-1"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 mb-1">Huruf Katakana</h4>
                    <p class="text-xs text-slate-500">Dasar, Dakuon & Tambahan Khusus</p>
                  </div>

                  <div @click="switchTab('kata_bilangan')" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-rose-300 transition cursor-pointer group">
                    <div class="flex items-center justify-between mb-3">
                      <span class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-lg flex items-center justify-center font-bold text-lg">123</span>
                      <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-rose-500 transition-transform group-hover:translate-x-1"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 mb-1">Kata Bilangan</h4>
                    <p class="text-xs text-slate-500">Angka & Rumus Hitung Man/Oku</p>
                  </div>

                  <div @click="switchTab('ungkapan_waktu')" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-rose-300 transition cursor-pointer group">
                    <div class="flex items-center justify-between mb-3">
                      <span class="w-10 h-10 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center font-bold text-lg"><i class="fa-regular fa-clock"></i></span>
                      <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-rose-500 transition-transform group-hover:translate-x-1"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 mb-1">Ungkapan Waktu</h4>
                    <p class="text-xs text-slate-500">Hari, Pagi, Malam, Minggu, Bulan, dll.</p>
                  </div>

                  <div @click="switchTab('kata_benda')" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-rose-300 transition cursor-pointer group">
                    <div class="flex items-center justify-between mb-3">
                      <span class="w-10 h-10 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center font-bold text-lg"><i class="fa-solid fa-box"></i></span>
                      <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-rose-500 transition-transform group-hover:translate-x-1"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 mb-1">Kata Benda</h4>
                    <p class="text-xs text-slate-500" x-text="materiData.kata_benda.length + ' Kosakata (Meishi)'"></p>
                  </div>

                </div>
              </div>

            </div>
          </template>

          <!-- HALAMAN MATERI: KANJI (KARTU VISUAL) -->
          <template x-if="activeTab === 'kanji_page'">
            <div class="space-y-6">
              <div class="flex justify-between items-center mb-2">
                <div>
                  <h2 class="text-xl font-bold text-slate-800">Daftar Kanji Dasar (漢字)</h2>
                  <p class="text-xs text-slate-500">Kartu belajar Kanji lengkap dengan cara baca Kun'yomi/Onyomi dan contoh kata.</p>
                </div>
                <span class="text-xs bg-rose-100 text-rose-700 font-bold px-3 py-1 rounded-full" x-text="materiData.kanji_list.length + ' Kanji'"></span>
              </div>

              <!-- Grid Kartu Kanji -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <template x-for="item in materiData.kanji_list" :key="item.id">
                  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition overflow-hidden flex flex-col">
                    
                    <!-- Header Card: Kanji & Arti -->
                    <div class="bg-slate-900 text-white p-4 flex items-center justify-between">
                      <div class="flex items-center gap-3">
                        <span class="text-xs bg-rose-600 text-white font-mono px-2 py-0.5 rounded" x-text="'#' + item.id"></span>
                        <h3 class="text-3xl font-extrabold font-serif text-rose-400" x-text="item.kanji"></h3>
                      </div>
                      <div class="text-right">
                        <span class="text-xs text-slate-400 uppercase tracking-wider block">Arti Dasar</span>
                        <span class="text-sm font-bold text-emerald-400" x-text="item.arti"></span>
                      </div>
                    </div>

                    <!-- Body Card: Cara Baca & Contoh Kata -->
                    <div class="p-4 space-y-4 flex-1 flex flex-col justify-between">
                      
                      <!-- Cara Baca -->
                      <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-xs space-y-1">
                        <div class="text-slate-500 font-semibold">Cara Baca:</div>
                        <div class="text-slate-800 font-medium leading-relaxed" x-text="item.caraBaca"></div>
                      </div>

                      <!-- Contoh Kata -->
                      <div class="space-y-2">
                        <div class="text-xs font-semibold text-slate-500 border-b border-slate-100 pb-1">Contoh Kata:</div>
                        <ul class="space-y-1 text-xs">
                          <template x-for="(ex, idx) in item.contoh" :key="idx">
                            <li class="flex items-center justify-between py-1 border-b border-slate-50 last:border-0">
                              <span class="font-serif text-sm font-bold text-slate-800" x-text="ex.k"></span>
                              <span class="text-slate-600 italic font-mono" x-text="ex.b"></span>
                              <span class="font-medium text-slate-700" x-text="ex.a"></span>
                            </li>
                          </template>
                        </ul>
                      </div>

                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- HALAMAN MATERI: HIRAGANA -->
          <template x-if="activeTab === 'hiragana_page'">
            <div class="space-y-4">
              <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold text-slate-800">Daftar Huruf Hiragana (ひらがな)</h2>
                <span class="text-xs bg-slate-200 text-slate-600 font-medium px-2.5 py-1 rounded-full" x-text="materiData.hiragana_list.length + ' Karakter'"></span>
              </div>

              <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                  <table class="w-full text-left border-collapse min-w-[350px]">
                    <thead>
                      <tr class="bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase tracking-wider">
                        <th class="py-3 px-4">Kategori Bunyi</th>
                        <th class="py-3 px-4">Romaji</th>
                        <th class="py-3 px-4 text-center">Huruf Hiragana</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm">
                      <template x-for="(item, index) in materiData.hiragana_list" :key="index">
                        <tr class="hover:bg-slate-50 transition">
                          <td class="py-3 px-4 font-medium text-slate-800" x-text="item.kategori"></td>
                          <td class="py-3 px-4 italic font-mono text-slate-600" x-text="item.romaji"></td>
                          <td class="py-3 px-4 font-bold text-slate-900 text-2xl text-center font-serif" x-text="item.hiragana"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </template>

          <!-- HALAMAN MATERI: KATAKANA -->
          <template x-if="activeTab === 'katakana_page'">
            <div class="space-y-4">
              <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold text-slate-800">Daftar Huruf Katakana (カタカナ)</h2>
                <span class="text-xs bg-slate-200 text-slate-600 font-medium px-2.5 py-1 rounded-full" x-text="materiData.katakana_list.length + ' Karakter'"></span>
              </div>

              <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                  <table class="w-full text-left border-collapse min-w-[350px]">
                    <thead>
                      <tr class="bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase tracking-wider">
                        <th class="py-3 px-4">Kategori Bunyi</th>
                        <th class="py-3 px-4">Romaji</th>

  <!-- Data Script Alpine.js -->
  <script>
    function kotobaApp() {
      return {
        sidebarOpen: false,
        kotobaDropdown: true,
        kataKerjaDropdown: true,
        activeTab: 'dashboard',

        // --- STATE LATIHAN KOTOBA ---
        quizStage: 'setup',
        selectedCategories: ['kanji_list', 'hiragana_list', 'katakana_list', 'kata_bilangan', 'ungkapan_waktu', 'penanda_waktu', 'kata_keterangan', 'kata_benda', 'salam', 'kazoku', 'kk_gol1', 'kk_gol2', 'kk_gol3'],
        quizQuestionMode: 'indonesia',
        quizTimeOption: '0',
        quizLength: '10',
        
        quizQuestions: [],
        currentQuestionIndex: 0,
        currentQuestion: {},
        selectedAnswer: null,
        
        correctCount: 0,
        wrongCount: 0,
        quizScore: 0,
        
        timerInterval: null,
        timeLeft: 0,
        timeSpent: 0,

        quizCategories: [
          { key: 'kanji_list', title: 'Kanji Dasar (N5)' },
          { key: 'hiragana_list', title: 'Huruf Hiragana (Per Karakter)' },
          { key: 'katakana_list', title: 'Huruf Katakana (Per Karakter)' },
          { key: 'kata_bilangan', title: 'Kata Bilangan (Suuji)' },
          { key: 'ungkapan_waktu', title: 'Ungkapan Waktu' },
          { key: 'penanda_waktu', title: 'Penanda Waktu' },
          { key: 'kata_keterangan', title: 'Kata Keterangan' },
          { key: 'kata_benda', title: 'Kata Benda' },
          { key: 'salam', title: 'Salam (Aisatsu)' },
          { key: 'kazoku', title: 'Kazoku (Anggota Keluarga)' },
          { key: 'kk_gol1', title: 'Kata Kerja (Golongan I)' },
          { key: 'kk_gol2', title: 'Kata Kerja (Golongan II)' },
          { key: 'kk_gol3', title: 'Kata Kerja (Golongan III)' }
        ],

        switchTab(tab) {
          this.activeTab = tab;
          this.sidebarOpen = false;
        },

        getCategoryTitle(tab) {
          const titles = {
            'dashboard': 'Dashboard Utama',
            'hiragana_page': 'Huruf Hiragana (ひらがな)',
            'katakana_page': 'Huruf Katakana (カタカナ)',
            'kanji_page': 'Kanji Dasar (漢字)',
            'kata_bilangan': 'Kata Bilangan (数 - Suuji)',
            'ungkapan_waktu': 'Ungkapan Waktu & Jangka Waktu',
            'penanda_waktu': 'Penanda Waktu (Jam, Hari, Tanggal & Bulan)',
            'kata_keterangan': 'Kata Keterangan (Fukushi)',
            'kata_benda': 'Kata Benda (Meishi)',
            'salam': 'Salam (Aisatsu)',
            'kazoku': 'Kazoku (Anggota Keluarga)',
            'kk_gol1': 'Kata Kerja Golongan I',
            'kk_gol2': 'Kata Kerja Golongan II',
            'kk_gol3': 'Kata Kerja Golongan III',
            'latihan': 'Latihan Kotoba'
          };
          return titles[tab] || '';
        },

        getTotalKotobaCount() {
          let pool = this.getAllPoolItems();
          return pool.length;
        },

        getVerbCount() {
          return (this.materiData.kk_gol1.length + this.materiData.kk_gol2.length + this.materiData.kk_gol3.length);
        },

        // --- KONVERSI ANGKA PURE ROMAJI & HIRAGANA JEPANG ---
        convertNumberToJapanese(num) {
          if (num === 0) return { romaji: 'zero', hiragana: 'ゼロ' };

          const units = ['', 'ichi', 'ni', 'san', 'yon', 'go', 'roku', 'nana', 'hachi', 'kyuu'];
          const unitsHira = ['', 'いち', 'に', 'さん', 'よん', 'ご', 'ろく', 'なな', 'はち', 'きゅう'];

          const parseUnder10k = (n) => {
            let r = [], h = [];
            let th = Math.floor(n / 1000);
            let hu = Math.floor((n % 1000) / 100);
            let te = Math.floor((n % 100) / 10);
            let un = n % 10;

            if (th === 1) { r.push('sen'); h.push('せん'); }
            else if (th === 3) { r.push('sanzen'); h.push('さんぜん'); }
            else if (th === 8) { r.push('hassen'); h.push('はっせん'); }
            else if (th > 0) { r.push(units[th] + '-sen'); h.push(unitsHira[th] + 'せん'); }

            if (hu === 1) { r.push('hyaku'); h.push('ひゃく'); }
            else if (hu === 3) { r.push('sanbyaku'); h.push('さんびゃく'); }
            else if (hu === 6) { r.push('roppyaku'); h.push('ろっぴゃく'); }
            else if (hu === 8) { r.push('happyaku'); h.push('はっぴゃく'); }
            else if (hu > 0) { r.push(units[hu] + '-hyaku'); h.push(unitsHira[hu] + 'ひゃく'); }

            if (te === 1) { r.push('juu'); h.push('じゅう'); }
            else if (te > 0) { r.push(units[te] + '-juu'); h.push(unitsHira[te] + 'じゅう'); }

            if (un > 0) { r.push(units[un]); h.push(unitsHira[un]); }

            return { romaji: r.join(' '), hiragana: h.join(' ') };
          };

          let manPart = Math.floor(num / 10000);
          let remainder = num % 10000;

          let resR = [], resH = [];

          if (manPart > 0) {
            let mObj = parseUnder10k(manPart);
            resR.push(mObj.romaji + '-man');
            resH.push(mObj.hiragana + 'まん');
          }

          if (remainder > 0) {
            let rObj = parseUnder10k(remainder);
            resR.push(rObj.romaji);
            resH.push(rObj.hiragana);
          }

          return {
            romaji: resR.join(' '),
            hiragana: resH.join(' ')
          };
        },

        generateRandomNumberItems(count = 12) {
          const items = [];
          for (let i = 0; i < count; i++) {
            const num = Math.floor(Math.random() * 890000) + 10000;
            const jp = this.convertNumberToJapanese(num);

            items.push({
              indonesia: num.toLocaleString('id-ID'),
              romaji: jp.romaji,
              hiragana: jp.hiragana,
              katakana: jp.hiragana
            });
          }
          return items;
        },

        getAllPoolItems() {
          let pool = [];
          const allKeys = ['kanji_list', 'hiragana_list', 'katakana_list', 'kata_bilangan', 'ungkapan_waktu', 'penanda_waktu', 'kata_keterangan', 'kata_benda', 'salam', 'kazoku', 'kk_gol1', 'kk_gol2', 'kk_gol3'];
          
          allKeys.forEach(catKey => {
            const data = this.materiData[catKey];
            if (Array.isArray(data)) {
              if (catKey === 'kanji_list') {
                data.forEach(k => {
                  pool.push({ indonesia: `${k.kanji} (${k.arti})`, romaji: k.caraBaca, hiragana: k.caraBaca, katakana: k.kanji });
                });
              } else if (data.length > 0 && data[0].subJudul) {
                data.forEach(sub => {
                  pool = pool.concat(sub.items);
                });
              } else {
                pool = pool.concat(data);
              }
            }
          });
          return pool;
        },

        startQuiz() {
          let pool = [];
          this.selectedCategories.forEach(catKey => {
            if (catKey === 'kata_bilangan') {
              pool = pool.concat(this.materiData.kata_bilangan);
              pool = pool.concat(this.generateRandomNumberItems(15));
            } else if (catKey === 'kanji_list') {
              this.materiData.kanji_list.forEach(k => {
                pool.push({ indonesia: `${k.kanji} - Arti: ${k.arti}`, romaji: k.caraBaca, hiragana: k.caraBaca, katakana: k.kanji });
              });
            } else {
              const data = this.materiData[catKey];
              if (Array.isArray(data)) {
                if (data.length > 0 && data[0].subJudul) {
                  data.forEach(sub => {
                    pool = pool.concat(sub.items);
                  });
                } else {
                  pool = pool.concat(data);
                }
              }
            }
          });

          if (pool.length < 4) {
            alert('Materi terpilih terlalu sedikit untuk membuat kuis.');
            return;
          }

          const shuffledPool = [...pool].sort(() => 0.5 - Math.random());
          const totalQuestions = Math.min(parseInt(this.quizLength), shuffledPool.length);
          const selectedItems = shuffledPool.slice(0, totalQuestions);

          this.quizQuestions = selectedItems.map(item => {
            const isIndo = this.quizQuestionMode === 'indonesia';
            
            let questionText = '';
            let correctAnswerText = '';

            if (item.hiragana && !item.indonesia) {
              questionText = isIndo ? item.hiragana : item.romaji;
              correctAnswerText = isIndo ? item.romaji : item.hiragana;
            } else if (item.katakana && !item.indonesia && !item.hiragana) {
              questionText = isIndo ? item.katakana : item.romaji;
              correctAnswerText = isIndo ? item.romaji : item.katakana;
            } else {
              questionText = isIndo ? item.indonesia : item.romaji;
              correctAnswerText = isIndo ? `${item.romaji} (${item.hiragana || item.katakana})` : `${item.indonesia}`;
            }

            const distractors = pool
              .filter(p => p.romaji !== item.romaji)
              .sort(() => 0.5 - Math.random())
              .slice(0, 3)
              .map(d => {
                if (d.hiragana && !d.indonesia) {
                  return isIndo ? d.romaji : d.hiragana;
                }
                if (d.katakana && !d.indonesia && !d.hiragana) {
                  return isIndo ? d.romaji : d.katakana;
                }
                return isIndo ? `${d.romaji} (${d.hiragana || d.katakana})` : `${d.indonesia}`;
              });

            const options = [
              { text: correctAnswerText, isCorrect: true },
              ...distractors.map(dText => ({ text: dText, isCorrect: false }))
            ].sort(() => 0.5 - Math.random());

            return {
              question: questionText,
              correctAnswer: correctAnswerText,
              options: options
            };
          });

          this.currentQuestionIndex = 0;
          this.currentQuestion = this.quizQuestions[0];
          this.selectedAnswer = null;
          this.correctCount = 0;
          this.wrongCount = 0;
          this.timeSpent = 0;

          const minutes = parseInt(this.quizTimeOption);
          this.timeLeft = minutes > 0 ? minutes * 60 : 0;
          this.quizStage = 'active';

          clearInterval(this.timerInterval);
          this.timerInterval = setInterval(() => {
            this.timeSpent++;
            if (minutes > 0) {
              this.timeLeft--;
              if (this.timeLeft <= 0) {
                this.finishQuiz();
              }
            }
          }, 1000);
        },

        selectAnswer(opt) {
          if (this.selectedAnswer !== null) return;
          this.selectedAnswer = opt;

          if (opt.isCorrect) {
            this.correctCount++;
          } else {
            this.wrongCount++;
          }
        },

        nextQuestion() {
          if (this.currentQuestionIndex < this.quizQuestions.length - 1) {
            this.currentQuestionIndex++;
            this.currentQuestion = this.quizQuestions[this.currentQuestionIndex];
            this.selectedAnswer = null;
          } else {
            this.finishQuiz();
          }
        },

        finishQuiz() {
          clearInterval(this.timerInterval);
          const totalQuestions = this.quizQuestions.length;
          const answered = this.correctCount + this.wrongCount;
          if (answered < totalQuestions) {
            this.wrongCount += (totalQuestions - answered);
          }

          this.quizScore = Math.round((this.correctCount / totalQuestions) * 100);
          this.quizStage = 'result';
        },

        resetQuiz() {
          this.quizStage = 'setup';
          clearInterval(this.timerInterval);
        },

        formatTime(seconds) {
          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        },
