<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar Kotoba</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js untuk interaksi Dropdown, Navigasi, & Data State -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- FontAwesome untuk Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800" x-data="kotobaApp()">

  <div class="flex h-screen overflow-hidden">
    
    <!-- Overlay untuk Mobile saat Sidebar Terbuka -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-black/50 z-40 md:hidden" x-transition.opacity></div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:inset-auto flex flex-col shadow-xl">
      
      <!-- Sidebar Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-800">
        <h1 class="text-xl font-bold text-white flex items-center gap-2">
          <i class="fa-solid fa-language text-rose-500"></i> KotobaApp
        </h1>
        <button @click="sidebarOpen = false" class="md:hidden text-slate-400 hover:text-white">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <!-- Navigation Links -->
      <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-3 mb-2">Menu Utama</div>
        
        <!-- Menu 1: Kotoba (Dengan Dropdown) -->
        <div>
          <button @click="kotobaDropdown = !kotobaDropdown" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition font-medium">
            <div class="flex items-center gap-3">
              <i class="fa-solid fa-book-open text-rose-500 w-5"></i>
              <span>Kotoba</span>
            </div>
            <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" :class="kotobaDropdown ? 'rotate-180' : ''"></i>
          </button>

          <!-- Dropdown List -->
          <div x-show="kotobaDropdown" x-transition class="pl-8 pr-2 mt-1 space-y-1">
            
            <button @click="switchTab('ungkapan_waktu')" 
                    :class="activeTab === 'ungkapan_waktu' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Ungkapan Waktu
            </button>

            <button @click="switchTab('penanda_waktu')" 
                    :class="activeTab === 'penanda_waktu' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Penanda Waktu
            </button>

            <button @click="switchTab('kata_keterangan')" 
                    :class="activeTab === 'kata_keterangan' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Kata Keterangan
            </button>

            <button @click="switchTab('kata_benda')" 
                    :class="activeTab === 'kata_benda' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Kata Benda
            </button>

            <button @click="switchTab('salam')" 
                    :class="activeTab === 'salam' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Salam (Aisatsu)
            </button>

            <button @click="switchTab('kazoku')" 
                    :class="activeTab === 'kazoku' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Kazoku (Keluarga)
            </button>

          </div>
        </div>

        <!-- Menu 2: Kata Kerja (Dengan Dropdown Golongan 1, 2, 3) -->
        <div>
          <button @click="kataKerjaDropdown = !kataKerjaDropdown" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition font-medium">
            <div class="flex items-center gap-3">
              <i class="fa-solid fa-person-running text-rose-500 w-5"></i>
              <span>Kata Kerja</span>
            </div>
            <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" :class="kataKerjaDropdown ? 'rotate-180' : ''"></i>
          </button>

          <!-- Dropdown List Kata Kerja -->
          <div x-show="kataKerjaDropdown" x-transition class="pl-8 pr-2 mt-1 space-y-1">
            <button @click="switchTab('kk_gol1')" 
                    :class="activeTab === 'kk_gol1' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Golongan I
            </button>
            <button @click="switchTab('kk_gol2')" 
                    :class="activeTab === 'kk_gol2' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Golongan II
            </button>
            <button @click="switchTab('kk_gol3')" 
                    :class="activeTab === 'kk_gol3' ? 'text-rose-400 font-semibold' : 'text-slate-400 hover:text-white'" 
                    class="w-full text-left text-sm py-2 px-2 rounded-md hover:bg-slate-800/50 block transition">
              • Golongan III
            </button>
          </div>
        </div>

        <!-- Menu 3: Latihan Kotoba -->
        <button @click="switchTab('latihan')" 
                :class="activeTab === 'latihan' ? 'bg-rose-600 text-white font-medium' : 'hover:bg-slate-800 hover:text-white'" 
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition font-medium">
          <i class="fa-solid fa-pen-to-square w-5"></i>
          <span>Latihan Kotoba</span>
        </button>

      </nav>

      <!-- Sidebar Footer -->
      <div class="p-4 border-t border-slate-800 text-xs text-center text-slate-500">
        Mobile Friendly 📱
      </div>
    </aside>

    <!-- Content Area -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
      
      <!-- Top Header -->
      <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-4">
          <button @click="sidebarOpen = true" class="md:hidden text-slate-600 hover:text-slate-900 focus:outline-none">
            <i class="fa-solid fa-bars text-xl"></i>
          </button>
          
          <span class="text-lg font-semibold text-slate-800" x-text="getCategoryTitle(activeTab)"></span>
        </div>
      </header>

      <!-- Main Body Content -->
      <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <div class="max-w-4xl mx-auto space-y-6">
          
          <!-- Halaman Berkelompok (Ungkapan Waktu & Penanda Waktu) -->
          <template x-if="activeTab === 'ungkapan_waktu' || activeTab === 'penanda_waktu'">
            <div class="space-y-8">
              <template x-for="sub in materiData[activeTab]" :key="sub.subJudul">
                <div class="space-y-3">
                  <div class="flex items-center gap-2 border-b-2 border-rose-500 pb-1">
                    <i class="fa-regular fa-calendar-check text-rose-500"></i>
                    <h3 class="text-lg font-bold text-slate-800" x-text="sub.subJudul"></h3>
                  </div>

                  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                      <table class="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                          <tr class="bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase tracking-wider">
                            <th class="py-3 px-4">Bahasa Indonesia</th>
                            <th class="py-3 px-4">Romaji</th>
                            <th class="py-3 px-4">Hiragana</th>
                            <th class="py-3 px-4">Katakana</th>
                          </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-sm">
                          <template x-for="(item, index) in sub.items" :key="index">
                            <tr class="hover:bg-slate-50 transition">
                              <td class="py-3 px-4 font-medium text-slate-800" x-text="item.indonesia"></td>
                              <td class="py-3 px-4 italic font-mono text-slate-600" x-text="item.romaji"></td>
                              <td class="py-3 px-4 font-bold text-slate-900 text-base" x-text="item.hiragana"></td>
                              <td class="py-3 px-4 text-rose-500 font-medium" x-text="item.katakana"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Halaman Tabel Kotoba Kategori Lainnya -->
          <template x-if="activeTab !== 'latihan' && activeTab !== 'ungkapan_waktu' && activeTab !== 'penanda_waktu'">
            <div class="space-y-4">
              <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold text-slate-800" x-text="getCategoryTitle(activeTab)"></h2>
                <span class="text-xs bg-slate-200 text-slate-600 font-medium px-2.5 py-1 rounded-full" x-text="materiData[activeTab] ? materiData[activeTab].length + ' Kata' : ''"></span>
              </div>

              <!-- Container Tabel -->
              <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                  <table class="w-full text-left border-collapse min-w-[500px]">
                    <thead>
                      <tr class="bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase tracking-wider">
                        <th class="py-3 px-4">Bahasa Indonesia</th>
                        <th class="py-3 px-4">Romaji</th>
                        <th class="py-3 px-4">Hiragana</th>
                        <th class="py-3 px-4">Katakana</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm">
                      <template x-for="(item, index) in materiData[activeTab]" :key="index">
                        <tr class="hover:bg-slate-50 transition">
                          <td class="py-3 px-4 font-medium text-slate-800" x-text="item.indonesia"></td>
                          <td class="py-3 px-4 italic font-mono text-slate-600" x-text="item.romaji"></td>
                          <td class="py-3 px-4 font-bold text-slate-900 text-base" x-text="item.hiragana"></td>
                          <td class="py-3 px-4 text-rose-500 font-medium" x-text="item.katakana"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          </template>

          <!-- Halaman Latihan Kotoba -->
          <template x-if="activeTab === 'latihan'">
            <div class="space-y-6">
              
              <!-- STAGE 1: SETUP LATIHAN -->
              <template x-if="quizStage === 'setup'">
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm space-y-6">
                  <div>
                    <h2 class="text-xl font-bold text-slate-800 mb-1">Pengaturan Latihan Kotoba</h2>
                    <p class="text-sm text-slate-500">Pilih materi, waktu, dan format kuis sebelum memulai.</p>
                  </div>

                  <!-- 1. Checkbox Kategori Materi -->
                  <div class="space-y-3">
                    <label class="block text-sm font-semibold text-slate-700">1. Pilih Kategori Materi:</label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      <template x-for="cat in quizCategories" :key="cat.key">
                        <label class="flex items-center p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition">
                          <input type="checkbox" :value="cat.key" x-model="selectedCategories" class="w-4 h-4 text-rose-600 rounded border-slate-300 focus:ring-rose-500">
                          <span class="ml-3 text-sm font-medium text-slate-700" x-text="cat.title"></span>
                        </label>
                      </template>
                    </div>
                  </div>

                  <!-- 2. Mode Pertanyaan (Soal B.Indo atau Romaji) -->
                  <div class="space-y-3">
                    <label class="block text-sm font-semibold text-slate-700">2. Format Soal Utama:</label>
                    <div class="grid grid-cols-2 gap-3">
                      <label class="flex items-center p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition">
                        <input type="radio" value="indonesia" x-model="quizQuestionMode" class="w-4 h-4 text-rose-600 border-slate-300 focus:ring-rose-500">
                        <span class="ml-2 text-sm font-medium text-slate-700">Bahasa Indonesia</span>
                      </label>
                      <label class="flex items-center p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition">
                        <input type="radio" value="romaji" x-model="quizQuestionMode" class="w-4 h-4 text-rose-600 border-slate-300 focus:ring-rose-500">
                        <span class="ml-2 text-sm font-medium text-slate-700">Romaji</span>
                      </label>
                    </div>
                  </div>

                  <!-- 3. Pengaturan Waktu -->
                  <div class="space-y-3">
                    <label class="block text-sm font-semibold text-slate-700">3. Batas Waktu Pengerjaan:</label>
                    <select x-model="quizTimeOption" class="w-full p-3 rounded-lg border border-slate-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-rose-500">
                      <option value="0">Tanpa Waktu (Bebas)</option>
                      <option value="1">1 Menit</option>
                      <option value="3">3 Menit</option>
                      <option value="5">5 Menit</option>
                      <option value="10">10 Menit</option>
                    </select>
                  </div>

                  <!-- 4. Jumlah Soal -->
                  <div class="space-y-3">
                    <label class="block text-sm font-semibold text-slate-700">4. Jumlah Soal:</label>
                    <select x-model="quizLength" class="w-full p-3 rounded-lg border border-slate-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-rose-500">
                      <option value="10">10 Soal</option>
                      <option value="20">20 Soal</option>
                      <option value="30">30 Soal</option>
                      <option value="50">50 Soal</option>
                    </select>
                  </div>

                  <!-- Tombol Mulai -->
                  <button @click="startQuiz()" 
                          :disabled="selectedCategories.length === 0"
                          :class="selectedCategories.length === 0 ? 'bg-slate-300 cursor-not-allowed' : 'bg-rose-600 hover:bg-rose-700 text-white'"
                          class="w-full py-3.5 rounded-xl font-bold transition shadow-md flex items-center justify-center gap-2">
                    <i class="fa-solid fa-play"></i>
                    <span>Mulai Latihan</span>
                  </button>
                </div>
              </template>

              <!-- STAGE 2: PENGERJAAN KUIS -->
              <template x-if="quizStage === 'active'">
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm space-y-6">
                  
                  <!-- Quiz Top Bar -->
                  <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                    <div class="text-sm font-semibold text-slate-500">
                      Soal <span class="text-rose-600 font-bold" x-text="currentQuestionIndex + 1"></span> / <span x-text="quizQuestions.length"></span>
                    </div>

                    <!-- Timer Bar -->
                    <div class="flex items-center gap-2 font-mono text-sm font-bold" :class="timeLeft <= 10 && quizTimeOption > 0 ? 'text-rose-600 animate-pulse' : 'text-slate-700'">
                      <i class="fa-regular fa-clock"></i>
                      <span x-text="quizTimeOption > 0 ? formatTime(timeLeft) : 'Tanpa Batas'"></span>
                    </div>
                  </div>

                  <!-- Soal Card -->
                  <div class="text-center py-4 bg-slate-50 rounded-xl border border-slate-100 space-y-2">
                    <span class="text-xs uppercase tracking-wider font-semibold text-slate-400" x-text="quizQuestionMode === 'indonesia' ? 'Bahasa Indonesia' : 'Romaji'"></span>
                    <h3 class="text-2xl font-bold text-slate-900" x-text="currentQuestion.question"></h3>
                  </div>

                  <!-- Option Buttons -->
                  <div class="grid grid-cols-1 gap-3">
                    <template x-for="(opt, idx) in currentQuestion.options" :key="idx">
                      <button @click="selectAnswer(opt)" 
                              :disabled="selectedAnswer !== null"
                              :class="{
                                'border-slate-200 hover:bg-rose-50 hover:border-rose-300': selectedAnswer === null,
                                'bg-emerald-100 border-emerald-500 text-emerald-900 font-bold': selectedAnswer !== null && opt.isCorrect,
                                'bg-rose-100 border-rose-500 text-rose-900 font-bold': selectedAnswer !== null && selectedAnswer === opt && !opt.isCorrect,
                                'opacity-50 border-slate-200': selectedAnswer !== null && selectedAnswer !== opt && !opt.isCorrect
                              }"
                              class="w-full text-left p-4 rounded-xl border-2 transition flex items-center justify-between">
                        <span class="text-base font-medium" x-text="opt.text"></span>
                        
                        <template x-if="selectedAnswer !== null && opt.isCorrect">
                          <i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>
                        </template>
                        <template x-if="selectedAnswer !== null && selectedAnswer === opt && !opt.isCorrect">
                          <i class="fa-solid fa-circle-xmark text-rose-600 text-lg"></i>
                        </template>
                      </button>
                    </template>
                  </div>

                  <!-- Next Button -->
                  <div class="pt-2 flex justify-end">
                    <button x-show="selectedAnswer !== null" 
                            @click="nextQuestion()" 
                            class="px-6 py-2.5 bg-slate-900 text-white font-bold rounded-lg hover:bg-slate-800 transition flex items-center gap-2">
                      <span>Lanjut</span>
                      <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                  </div>

                </div>
              </template>

              <!-- STAGE 3: HASIL AKHIR -->
              <template x-if="quizStage === 'result'">
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm text-center space-y-6">
                  
                  <div class="space-y-2">
                    <div class="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto text-2xl font-bold">
                      <i class="fa-solid fa-trophy"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">Latihan Selesai!</h2>
                    <p class="text-sm text-slate-500">Berikut adalah rekapitulasi hasil latihan kamu.</p>
                  </div>

                  <!-- Skor Card -->
                  <div class="bg-slate-900 text-white rounded-2xl p-6 max-w-sm mx-auto shadow-lg">
                    <div class="text-xs uppercase tracking-wider text-slate-400 font-semibold mb-1">Nilai Akhir</div>
                    <div class="text-5xl font-black text-rose-400" x-text="quizScore"></div>
                  </div>

                  <!-- Details Grid -->
                  <div class="grid grid-cols-3 gap-3 max-w-md mx-auto text-center">
                    <div class="p-3 bg-emerald-50 rounded-xl border border-emerald-100">
                      <div class="text-xs text-emerald-600 font-semibold">Benar</div>
                      <div class="text-xl font-bold text-emerald-700" x-text="correctCount"></div>
                    </div>
                    <div class="p-3 bg-rose-50 rounded-xl border border-rose-100">
                      <div class="text-xs text-rose-600 font-semibold">Salah</div>
                      <div class="text-xl font-bold text-rose-700" x-text="wrongCount"></div>
                    </div>
                    <div class="p-3 bg-blue-50 rounded-xl border border-blue-100">
                      <div class="text-xs text-blue-600 font-semibold">Waktu</div>
                      <div class="text-sm font-bold text-blue-700 mt-1" x-text="formatTime(timeSpent)"></div>
                    </div>
                  </div>

                  <!-- Reset Button -->
                  <div class="pt-4">
                    <button @click="resetQuiz()" class="px-8 py-3 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition shadow-md inline-flex items-center gap-2">
                      <i class="fa-solid fa-rotate-right"></i>
                      <span>Coba Lagi</span>
                    </button>
                  </div>

                </div>
              </template>

            </div>
          </template>

        </div>
      </main>

    </div>
  </div>

  <!-- Data Script Alpine.js -->
  <script>
    function kotobaApp() {
      return {
        sidebarOpen: false,
        kotobaDropdown: true,
        kataKerjaDropdown: true,
        activeTab: 'kata_keterangan',

        // --- STATE LATIHAN KOTOBA ---
        quizStage: 'setup',
        selectedCategories: ['ungkapan_waktu', 'penanda_waktu', 'kata_keterangan', 'kata_benda', 'salam', 'kazoku', 'kk_gol1', 'kk_gol2', 'kk_gol3'],
        quizQuestionMode: 'indonesia',
        quizTimeOption: '0',
        quizLength: '10',
        
        quizQuestions: [],
        currentQuestionIndex: 0,
        currentQuestion: {},
        selectedAnswer: null,
        
        correctCount: 0,
        wrongCount: 0,
        quizScore: 0,
        
        timerInterval: null,
        timeLeft: 0,
        timeSpent: 0,

        quizCategories: [
          { key: 'ungkapan_waktu', title: 'Ungkapan Waktu' },
          { key: 'penanda_waktu', title: 'Penanda Waktu' },
          { key: 'kata_keterangan', title: 'Kata Keterangan' },
          { key: 'kata_benda', title: 'Kata Benda' },
          { key: 'salam', title: 'Salam (Aisatsu)' },
          { key: 'kazoku', title: 'Kazoku (Anggota Keluarga)' },
          { key: 'kk_gol1', title: 'Kata Kerja (Golongan I)' },
          { key: 'kk_gol2', title: 'Kata Kerja (Golongan II)' },
          { key: 'kk_gol3', title: 'Kata Kerja (Golongan III)' }
        ],

        switchTab(tab) {
          this.activeTab = tab;
          this.sidebarOpen = false;
        },

        getCategoryTitle(tab) {
          const titles = {
            'ungkapan_waktu': 'Ungkapan Waktu & Jangka Waktu',
            'penanda_waktu': 'Penanda Waktu (Jam, Hari, Tanggal & Bulan)',
            'kata_keterangan': 'Kata Keterangan (Fukushi)',
            'kata_benda': 'Kata Benda (Meishi)',
            'salam': 'Salam (Aisatsu)',
            'kazoku': 'Kazoku (Anggota Keluarga)',
            'kk_gol1': 'Kata Kerja Golongan I',
            'kk_gol2': 'Kata Kerja Golongan II',
            'kk_gol3': 'Kata Kerja Golongan III',
            'latihan': 'Latihan Kotoba'
          };
          return titles[tab] || '';
        },

        // --- LOGIKA LATIHAN KOTOBA ---
        getAllPoolItems() {
          let pool = [];
          this.selectedCategories.forEach(catKey => {
            const data = this.materiData[catKey];
            if (Array.isArray(data)) {
              if (data.length > 0 && data[0].subJudul) {
                data.forEach(sub => {
                  pool = pool.concat(sub.items);
                });
              } else {
                pool = pool.concat(data);
              }
            }
          });
          return pool;
        },

        startQuiz() {
          const pool = this.getAllPoolItems();
          if (pool.length < 4) {
            alert('Materi terpilih terlalu sedikit untuk membuat pilihan ganda.');
            return;
          }

          const shuffledPool = [...pool].sort(() => 0.5 - Math.random());
          const totalQuestions = Math.min(parseInt(this.quizLength), shuffledPool.length);
          const selectedItems = shuffledPool.slice(0, totalQuestions);

          this.quizQuestions = selectedItems.map(item => {
            const isIndo = this.quizQuestionMode === 'indonesia';
            const questionText = isIndo ? item.indonesia : item.romaji;
            const correctAnswerText = isIndo ? `${item.romaji} (${item.hiragana})` : `${item.indonesia} (${item.hiragana})`;

            const distractors = pool
              .filter(p => p.romaji !== item.romaji)
              .sort(() => 0.5 - Math.random())
              .slice(0, 3)
              .map(d => isIndo ? `${d.romaji} (${d.hiragana})` : `${d.indonesia} (${d.hiragana})`);

            const options = [
              { text: correctAnswerText, isCorrect: true },
              ...distractors.map(dText => ({ text: dText, isCorrect: false }))
            ].sort(() => 0.5 - Math.random());

            return {
              question: questionText,
              correctAnswer: correctAnswerText,
              options: options
            };
          });

          this.currentQuestionIndex = 0;
          this.currentQuestion = this.quizQuestions[0];
          this.selectedAnswer = null;
          this.correctCount = 0;
          this.wrongCount = 0;
          this.timeSpent = 0;

          const minutes = parseInt(this.quizTimeOption);
          this.timeLeft = minutes > 0 ? minutes * 60 : 0;
          this.quizStage = 'active';

          clearInterval(this.timerInterval);
          this.timerInterval = setInterval(() => {
            this.timeSpent++;
            if (minutes > 0) {
              this.timeLeft--;
              if (this.timeLeft <= 0) {
                this.finishQuiz();
              }
            }
          }, 1000);
        },

        selectAnswer(opt) {
          if (this.selectedAnswer !== null) return;
          this.selectedAnswer = opt;

          if (opt.isCorrect) {
            this.correctCount++;
          } else {
            this.wrongCount++;
          }
        },

        nextQuestion() {
          if (this.currentQuestionIndex < this.quizQuestions.length - 1) {
            this.currentQuestionIndex++;
            this.currentQuestion = this.quizQuestions[this.currentQuestionIndex];
            this.selectedAnswer = null;
          } else {
            this.finishQuiz();
          }
        },

        finishQuiz() {
          clearInterval(this.timerInterval);
          const totalQuestions = this.quizQuestions.length;
          const answered = this.correctCount + this.wrongCount;
          if (answered < totalQuestions) {
            this.wrongCount += (totalQuestions - answered);
          }

          this.quizScore = Math.round((this.correctCount / totalQuestions) * 100);
          this.quizStage = 'result';
        },

        resetQuiz() {
          this.quizStage = 'setup';
          clearInterval(this.timerInterval);
        },

          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;

                  <!-- 2. Mode Pertanyaan (Soal B.Indo atau Romaji) -->

                    <div class="grid grid-cols-2 gap-3">

                      <option value="0">Tanpa Waktu (Bebas)</option>
                      <option value="1">1 Menit</option>
                      <option value="3">3 Menit</option>
                      <option value="5">5 Menit</option>
                      <option value="10">10 Menit</option>
                    </select>
                  </div>

                  <!-- 4. Jumlah Soal -->
                  <div class="space-y-3">
                    <label class="block text-sm font-semibold text-slate-700">4. Jumlah Soal:</label>

                      <option value="10">10 Soal</option>
                      <option value="20">20 Soal</option>
                      <option value="30">30 Soal</option>
                      <option value="50">50 Soal</option>
                    </select>
                  </div>

                  <!-- Tombol Mulai -->

                          :disabled="selectedCategories.length === 0"

                </div>

              <!-- STAGE 2: PENGERJAAN KUIS -->

                    <h3 class="text-2xl font-bold text-slate-900" x-text="currentQuestion.question"></h3>

                  <!-- Option Buttons -->
                  <div class="grid grid-cols-1 gap-3">
                    <template x-for="(opt, idx) in currentQuestion.options" :key="idx">
                      <button @click="selectAnswer(opt)" 
                              :disabled="selectedAnswer !== null"
                              :class="{
                                'border-slate-200 hover:bg-rose-50 hover:border-rose-300': selectedAnswer === null,
                                'bg-emerald-100 border-emerald-500 text-emerald-900 font-bold': selectedAnswer !== null && opt.isCorrect,
                                'bg-rose-100 border-rose-500 text-rose-900 font-bold': selectedAnswer !== null && selectedAnswer === opt && !opt.isCorrect,
                                'opacity-50 border-slate-200': selectedAnswer !== null && selectedAnswer !== opt && !opt.isCorrect
                              }"
                              class="w-full text-left p-4 rounded-xl border-2 transition flex items-center justify-between">
                        <span class="text-base font-medium" x-text="opt.text"></span>
                        
                        <template x-if="selectedAnswer !== null && opt.isCorrect">
                          <i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>
                        </template>
                        <template x-if="selectedAnswer !== null && selectedAnswer === opt && !opt.isCorrect">
                          <i class="fa-solid fa-circle-xmark text-rose-600 text-lg"></i>
                        </template>
                      </button>
                    </template>
                  </div>

                  <!-- Next Button -->
                  <div class="pt-2 flex justify-end">
                    <button x-show="selectedAnswer !== null" 
                            @click="nextQuestion()"

                      <span>Lanjut</span>
                      <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                  </div>

                </div>
              </template>

              <!-- STAGE 3: HASIL AKHIR -->
              <template x-if="quizStage === 'result'">
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm text-center space-y-6">

                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">Latihan Selesai!</h2>
                    <p class="text-sm text-slate-500">Berikut adalah rekapitulasi hasil latihan kamu.</p>
                  </div>

                  <!-- Skor Card -->
                  <div class="bg-slate-900 text-white rounded-2xl p-6 max-w-sm mx-auto shadow-lg">
                    <div class="text-xs uppercase tracking-wider text-slate-400 font-semibold mb-1">Nilai Akhir</div>
                    <div class="text-5xl font-black text-rose-400" x-text="quizScore"></div>

                      <div class="text-xl font-bold text-rose-700" x-text="wrongCount"></div>
                    </div>
                    <div class="p-3 bg-blue-50 rounded-xl border border-blue-100">

                    </div>
                  </div>

                  <!-- Reset Button -->

                    <button @click="resetQuiz()" class="px-8 py-3 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition shadow-md inline-flex items-center gap-2">

                </div>
              </template>

        </div>

  <!-- Data Script Alpine.js -->
  <script>
    function kotobaApp() {
      return {
        sidebarOpen: false,
        kotobaDropdown: true,
        kataKerjaDropdown: true,
        activeTab: 'kata_keterangan',

        // --- STATE LATIHAN KOTOBA ---
        quizStage: 'setup',
        selectedCategories: ['ungkapan_waktu', 'penanda_waktu', 'kata_keterangan', 'kata_benda', 'salam', 'kazoku', 'kk_gol1', 'kk_gol2', 'kk_gol3'],
        quizQuestionMode: 'indonesia',
        quizTimeOption: '0',
        quizLength: '10',
        
        quizQuestions: [],
        currentQuestionIndex: 0,
        currentQuestion: {},
        selectedAnswer: null,
        
        correctCount: 0,
        wrongCount: 0,
        quizScore: 0,
        
        timerInterval: null,
        timeLeft: 0,
        timeSpent: 0,

        quizCategories: [
          { key: 'ungkapan_waktu', title: 'Ungkapan Waktu' },
          { key: 'penanda_waktu', title: 'Penanda Waktu' },
          { key: 'kata_keterangan', title: 'Kata Keterangan' },
          { key: 'kata_benda', title: 'Kata Benda' },
          { key: 'salam', title: 'Salam (Aisatsu)' },
          { key: 'kazoku', title: 'Kazoku (Anggota Keluarga)' },
          { key: 'kk_gol1', title: 'Kata Kerja (Golongan I)' },
          { key: 'kk_gol2', title: 'Kata Kerja (Golongan II)' },
          { key: 'kk_gol3', title: 'Kata Kerja (Golongan III)' }
        ],

        switchTab(tab) {
          this.activeTab = tab;
          this.sidebarOpen = false;
        },

        getCategoryTitle(tab) {
          const titles = {
            'ungkapan_waktu': 'Ungkapan Waktu & Jangka Waktu',
            'penanda_waktu': 'Penanda Waktu (Jam, Hari, Tanggal & Bulan)',
            'kata_keterangan': 'Kata Keterangan (Fukushi)',
            'kata_benda': 'Kata Benda (Meishi)',
            'salam': 'Salam (Aisatsu)',
            'kazoku': 'Kazoku (Anggota Keluarga)',
            'kk_gol1': 'Kata Kerja Golongan I',
            'kk_gol2': 'Kata Kerja Golongan II',
            'kk_gol3': 'Kata Kerja Golongan III',
            'latihan': 'Latihan Kotoba'
          };
          return titles[tab] || '';
        },

        // --- LOGIKA LATIHAN KOTOBA ---
        getAllPoolItems() {
          let pool = [];
          this.selectedCategories.forEach(catKey => {
            const data = this.materiData[catKey];
            if (Array.isArray(data)) {
              if (data.length > 0 && data[0].subJudul) {
                data.forEach(sub => {
                  pool = pool.concat(sub.items);
                });
              } else {
                pool = pool.concat(data);
              }
            }
          });
          return pool;
        },

        startQuiz() {
          const pool = this.getAllPoolItems();
          if (pool.length < 4) {
            alert('Materi terpilih terlalu sedikit untuk membuat pilihan ganda.');
            return;
          }

          const shuffledPool = [...pool].sort(() => 0.5 - Math.random());
          const totalQuestions = Math.min(parseInt(this.quizLength), shuffledPool.length);
          const selectedItems = shuffledPool.slice(0, totalQuestions);

          this.quizQuestions = selectedItems.map(item => {
            const isIndo = this.quizQuestionMode === 'indonesia';
            const questionText = isIndo ? item.indonesia : item.romaji;
            const correctAnswerText = isIndo ? `${item.romaji} (${item.hiragana})` : `${item.indonesia} (${item.hiragana})`;

            const distractors = pool
              .filter(p => p.romaji !== item.romaji)
              .sort(() => 0.5 - Math.random())
              .slice(0, 3)
              .map(d => isIndo ? `${d.romaji} (${d.hiragana})` : `${d.indonesia} (${d.hiragana})`);

            const options = [
              { text: correctAnswerText, isCorrect: true },
              ...distractors.map(dText => ({ text: dText, isCorrect: false }))
            ].sort(() => 0.5 - Math.random());

            return {
              question: questionText,
              correctAnswer: correctAnswerText,
              options: options
            };
          });

          this.currentQuestionIndex = 0;
          this.currentQuestion = this.quizQuestions[0];
          this.selectedAnswer = null;
          this.correctCount = 0;
          this.wrongCount = 0;
          this.timeSpent = 0;

          const minutes = parseInt(this.quizTimeOption);
          this.timeLeft = minutes > 0 ? minutes * 60 : 0;
          this.quizStage = 'active';

          clearInterval(this.timerInterval);
          this.timerInterval = setInterval(() => {
            this.timeSpent++;
            if (minutes > 0) {
              this.timeLeft--;
              if (this.timeLeft <= 0) {
                this.finishQuiz();
              }
            }
          }, 1000);
        },

        selectAnswer(opt) {
          if (this.selectedAnswer !== null) return;
          this.selectedAnswer = opt;

          if (opt.isCorrect) {
            this.correctCount++;
          } else {
            this.wrongCount++;
          }
        },

        nextQuestion() {
          if (this.currentQuestionIndex < this.quizQuestions.length - 1) {
            this.currentQuestionIndex++;
            this.currentQuestion = this.quizQuestions[this.currentQuestionIndex];
            this.selectedAnswer = null;
          } else {
            this.finishQuiz();
          }
        },

        finishQuiz() {
          clearInterval(this.timerInterval);
          const totalQuestions = this.quizQuestions.length;
          const answered = this.correctCount + this.wrongCount;
          if (answered < totalQuestions) {
            this.wrongCount += (totalQuestions - answered);
          }

          this.quizScore = Math.round((this.correctCount / totalQuestions) * 100);
          this.quizStage = 'result';
        },

        resetQuiz() {
          this.quizStage = 'setup';
          clearInterval(this.timerInterval);
        },

        formatTime(seconds) {
          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        },

        materiData: {

            },
            {
              subJudul: "Malam (晩 / 夜)",

                { indonesia: "Kemarin lusa malam", romaji: "ototoi no ban", hiragana: "おとtoiのばん", katakana: "オトトイノバン" },
                { indonesia: "Kemarin malam", romaji: "kinou no ban", hiragana: "きのうのばん", katakana: "キノウノバン" },
                { indonesia: "Malam ini", romaji: "konban", hiragana: "こんばんは", katakana: "コンバン" },
                { indonesia: "Besok malam", romaji: "ashita no ban", hiragana: "あしたのばん", katakana: "アシタノバン" },
                { indonesia: "Lusa malam", romaji: "asatte no ban", hiragana: "あさってのばん", katakana: "アサッテノバン" },

            {

                        <th class="py-3 px-4">Katakana</th>

                              :class="{

                              class="w-full text-left p-4 rounded-xl border-2 transition flex items-center justify-between">
                        <span class="text-base font-medium" x-text="opt.text"></span>
                        
                        <template x-if="selectedAnswer !== null && opt.isCorrect">
                          <i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>
                        </template>
                        <template x-if="selectedAnswer !== null && selectedAnswer === opt && !opt.isCorrect">

          const titles = {

            'latihan': 'Latihan Kotoba'
          };
          return titles[tab] || '';
        },

        // --- LOGIKA LATIHAN KOTOBA ---
        getAllPoolItems() {
          let pool = [];
          this.selectedCategories.forEach(catKey => {
            const data = this.materiData[catKey];
            if (Array.isArray(data)) {
              if (data.length > 0 && data[0].subJudul) {
                data.forEach(sub => {
                  pool = pool.concat(sub.items);
                });
              } else {
                pool = pool.concat(data);
              }
            }
          });
          return pool;
        },

        startQuiz() {
          const pool = this.getAllPoolItems();
          if (pool.length < 4) {
            alert('Materi terpilih terlalu sedikit untuk membuat pilihan ganda.');
            return;
          }

          const shuffledPool = [...pool].sort(() => 0.5 - Math.random());
          const totalQuestions = Math.min(parseInt(this.quizLength), shuffledPool.length);
          const selectedItems = shuffledPool.slice(0, totalQuestions);

          this.quizQuestions = selectedItems.map(item => {
            const isIndo = this.quizQuestionMode === 'indonesia';
            const questionText = isIndo ? item.indonesia : item.romaji;
            const correctAnswerText = isIndo ? `${item.romaji} (${item.hiragana})` : `${item.indonesia} (${item.hiragana})`;

            const distractors = pool
              .filter(p => p.romaji !== item.romaji)
              .sort(() => 0.5 - Math.random())
              .slice(0, 3)
              .map(d => isIndo ? `${d.romaji} (${d.hiragana})` : `${d.indonesia} (${d.hiragana})`);

            const options = [
              { text: correctAnswerText, isCorrect: true },
              ...distractors.map(dText => ({ text: dText, isCorrect: false }))
            ].sort(() => 0.5 - Math.random());

            return {
              question: questionText,
              correctAnswer: correctAnswerText,
              options: options
            };
          });

          this.currentQuestionIndex = 0;
          this.currentQuestion = this.quizQuestions[0];
          this.selectedAnswer = null;
          this.correctCount = 0;
          this.wrongCount = 0;
          this.timeSpent = 0;

          const minutes = parseInt(this.quizTimeOption);
          this.timeLeft = minutes > 0 ? minutes * 60 : 0;
          this.quizStage = 'active';

          clearInterval(this.timerInterval);
          this.timerInterval = setInterval(() => {
            this.timeSpent++;
            if (minutes > 0) {
              this.timeLeft--;
              if (this.timeLeft <= 0) {
                this.finishQuiz();
              }
            }
          }, 1000);
        },

        selectAnswer(opt) {
          if (this.selectedAnswer !== null) return;
          this.selectedAnswer = opt;

          if (opt.isCorrect) {
            this.correctCount++;
          } else {
            this.wrongCount++;
          }
        },

        nextQuestion() {
          if (this.currentQuestionIndex < this.quizQuestions.length - 1) {
            this.currentQuestionIndex++;
            this.currentQuestion = this.quizQuestions[this.currentQuestionIndex];
            this.selectedAnswer = null;
          } else {
            this.finishQuiz();
          }
        },

        finishQuiz() {
          clearInterval(this.timerInterval);
          const totalQuestions = this.quizQuestions.length;
          const answered = this.correctCount + this.wrongCount;
          if (answered < totalQuestions) {
            this.wrongCount += (totalQuestions - answered);
          }

          this.quizScore = Math.round((this.correctCount / totalQuestions) * 100);
          this.quizStage = 'result';
        },

        resetQuiz() {
          this.quizStage = 'setup';
          clearInterval(this.timerInterval);
        },

        formatTime(seconds) {
          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
